[service]
# Configurações do Protheus Exporter Service

# Endereço de bind (0.0.0.0 = todas as interfaces)
host = 0.0.0.0

# Porta do servidor
port = 8000

# Número de workers/threads
workers = 4

# Ambiente do Protheus (PROD, HML, DEV)
environment = PROD

[persistence]
# Habilitar persistência de métricas entre reinicializações
# true = salva métricas em arquivo JSON e restaura ao reiniciar
# false = métricas são perdidas ao reiniciar (mais leve)
enabled = true

# Diretório para armazenar dados persistentes
data_dir = data

# Intervalo de salvamento automático (segundos)
save_interval = 60

[logging]
# Nível de log (DEBUG, INFO, WARNING, ERROR, CRITICAL)
level = INFO

# Diretório de logs (relativo ao script ou caminho absoluto)
log_dir = logs

# Rotação de logs
max_bytes = 10485760
backup_count = 5
